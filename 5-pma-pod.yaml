apiVersion: v1
kind: Pod
metadata:
  labels:
    run: pma
  name: pma
  namespace: wordpress-ns
spec:
  containers:
  - image: phpmyadmin
    name: pma
    ports:
    - containerPort: 80
      name: pma
    env:
    - name: PMA_HOST
      valueFrom:
        configMapKeyRef:
          name: wordpress-config
          key: PMA_HOST
    - name: PMA_PORT
      valueFrom:
        configMapKeyRef:
          name: wordpress-config
          key: PMA_PORT
    - name: MYSQL_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: wordpress-secret
          key: MYSQL_ROOT_PASSWORD
